# ONEE SWEEPER 配置文件示例
# 複製此文件為 config.toml 並根據需求修改

[app_setting]
# 快速掃描間隔（分鐘）
# 建議值：15-60 分鐘
# 快速掃描只檢查數據庫記錄，速度快，適合頻繁執行
small_scan_interval = 30

# 完整掃描間隔（分鐘）
# 建議值：60-240 分鐘
# 完整掃描會遍歷整個資料夾，發現新文件，速度較慢
complete_scan_interval = 120

# 測試模式（可選，默認 false）
# true: 只記錄不實際刪除，用於測試配置
# false: 實際執行刪除操作
test_mode = true

# 日誌文件最大大小（可選，默認 10 MB）
# 超過此大小會自動備份並清空
log_max_size_mb = 10

# ============================================================
# 任務配置
# 可以配置多個任務，每個任務清理一個資料夾
# ============================================================

# 示例 1: 清理下載資料夾中的臨時文件
[[tasks]]
folder_path = "C:/Users/YourName/Downloads"
really_delete = false  # false=移入垃圾桶，true=徹底刪除

# 只清理匹配的文件（可選）
# 不設置 target 則清理所有超過閾值的文件
target = [
    "*.tmp",      # 所有 .tmp 文件
    "*.temp",     # 所有 .temp 文件
    "Temp_*",     # 所有以 Temp_ 開頭的文件/資料夾
]

# 時間閾值：超過此時間的文件將被刪除
[tasks.threshold]
day = 7       # 7 天
hour = 0      # 0 小時
minute = 0    # 0 分鐘
# 總計：7 天

# ============================================================

# 示例 2: 清理項目構建緩存
[[tasks]]
folder_path = "D:/Projects"
really_delete = true  # 構建緩存可以徹底刪除

# 使用 ** 匹配任意層級的目錄
target = [
    "**/target/**",        # Rust 構建目錄
    "**/node_modules/**",  # Node.js 依賴
    "**/.cache/**",        # 各種緩存目錄
    "**/build/**",         # 構建輸出
]

[tasks.threshold]
day = 30
hour = 0
minute = 0
# 總計：30 天

# ============================================================

# 示例 3: 清理舊日誌文件
[[tasks]]
folder_path = "C:/Logs"
really_delete = true

target = [
    "*.log",      # 所有 .log 文件
    "*.log.*",    # 所有 .log.* 文件（如 app.log.1）
]

[tasks.threshold]
day = 14
hour = 0
minute = 0
# 總計：14 天

# ============================================================

# 示例 4: 清理整個臨時資料夾（不指定 target）
[[tasks]]
folder_path = "C:/Temp"
really_delete = false
# 不設置 target，清理所有超過閾值的文件和資料夾

[tasks.threshold]
day = 1
hour = 0
minute = 0
# 總計：1 天

# ============================================================
# Glob 模式說明
# ============================================================
# *       匹配任意字符（不包括路徑分隔符）
#         例：*.txt 匹配所有 .txt 文件
#
# **      匹配任意層級的目錄
#         例：**/cache/** 匹配所有名為 cache 的資料夾及其內容
#
# ?       匹配單個字符
#         例：file?.txt 匹配 file1.txt, fileA.txt 等
#
# [...]   匹配字符集
#         例：file[0-9].txt 匹配 file0.txt 到 file9.txt
# ============================================================

# ============================================================
# 安全提示
# ============================================================
# 1. 首次使用請開啟 test_mode = true
# 2. 謹慎使用 really_delete = true
# 3. 不要設置過短的閾值
# 4. 定期檢查日誌文件
# 5. 備份重要數據
# ============================================================
